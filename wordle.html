    "ZOUAVE","ZOUNDS","ZOYSIA","ZUISIN","ZUNIAN"
  ].map(w => w.toUpperCase()).filter(w => w.length === 6);

  // Deduplicate the word list
  const _seen = new Set();
  const DEDUPED_WORDS = WORDS.filter(w => {
    if (_seen.has(w)) return false;
    _seen.add(w);
    return true;
  });

  // Valid guesses = same as the answer pool
  const VALID_WORDS = new Set(DEDUPED_WORDS);

  // ── Game State ──
  const ROWS = 7;
  const COLS = 6;
  let targetWord  = "";
  let currentRow  = 0;
  let currentCol  = 0;
  let board       = [];
  let guesses     = [];
  let gameOver    = false;
  let toastTimer  = null;

  // ── Build Board ──
  function buildBoard() {
    const boardEl = document.getElementById("board");
    boardEl.innerHTML = "";
    board = [];
    for (let r = 0; r < ROWS; r++) {
      const row = document.createElement("div");
      row.className = "row";
      const rowTiles = [];
      for (let c = 0; c < COLS; c++) {
        const tile = document.createElement("div");
        tile.className = "tile";
        row.appendChild(tile);
        rowTiles.push(tile);
      }
      boardEl.appendChild(row);
      board.push(rowTiles);
    }
  }

  // ── Build Keyboard ──
  function buildKeyboard() {
    const rows = [
      ["Q","W","E","R","T","Y","U","I","O","P"],
      ["A","S","D","F","G","H","J","K","L"],
      ["ENTER","Z","X","C","V","B","N","M","⌫"]
    ];
    rows.forEach((letters, i) => {
      const rowEl = document.getElementById(`kb-row-${i + 1}`);
      rowEl.innerHTML = "";
      letters.forEach(letter => {
        const btn = document.createElement("button");
        btn.className = "key" + (letter.length > 1 ? " wide" : "");
        btn.textContent = letter;
        btn.dataset.key = letter;
        btn.addEventListener("click", () => handleKey(letter));
        rowEl.appendChild(btn);
      });
    });
  }

  // ── New Game ──
  function newGame() {
    targetWord = DEDUPED_WORDS[Math.floor(Math.random() * DEDUPED_WORDS.length)];
    currentRow = 0;
    currentCol = 0;
    guesses    = [];
    gameOver   = false;
    buildBoard();
    buildKeyboard();
    document.getElementById("end-overlay").classList.remove("show");
  }

  // ── Keyboard Input ──
  function handleKey(key) {
    if (gameOver) return;
    if (key === "⌫" || key === "BACKSPACE") {
      deleteLetter();
    } else if (key === "ENTER") {
      submitGuess();
    } else if (/^[A-Z]$/.test(key.toUpperCase())) {
      typeLetter(key.toUpperCase());
    }
  }

  document.addEventListener("keydown", e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key === "Enter")          handleKey("ENTER");
    else if (e.key === "Backspace") handleKey("BACKSPACE");
    else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
  });

  function typeLetter(letter) {
    if (currentCol >= COLS) return;
    const tile = board[currentRow][currentCol];
    tile.textContent = letter;
    tile.dataset.letter = letter;
    currentCol++;
  }

  function deleteLetter() {
    if (currentCol <= 0) return;
    currentCol--;
    const tile = board[currentRow][currentCol];
    tile.textContent = "";
    delete tile.dataset.letter;
  }

  // ── Submit Guess ──
  function submitGuess() {
    if (currentCol < COLS) {
      showToast("Not enough letters");
      shakeRow(currentRow);
      return;
    }
    const guess = board[currentRow].map(t => t.textContent).join("");
    if (!VALID_WORDS.has(guess)) {
      showToast("Not in word list");
      shakeRow(currentRow);
      return;
    }
    const result = evaluate(guess, targetWord);
    revealRow(currentRow, result, guess);
    guesses.push(guess);

    const won = result.every(r => r === "correct");
    if (won) {
      gameOver = true;
      setTimeout(() => {
        bounceRow(currentRow);
        setTimeout(() => showEndScreen(true), 800);
      }, COLS * 100 + 300);
    } else if (currentRow === ROWS - 1) {
      gameOver = true;
      setTimeout(() => showEndScreen(false), COLS * 100 + 600);
    }
    currentRow++;
    currentCol = 0;
  }

  // ── Evaluate Guess ──
  function evaluate(guess, target) {
    const result    = Array(COLS).fill("absent");
    const targetArr = target.split("");
    const guessArr  = guess.split("");
    const used      = Array(COLS).fill(false);

    // Pass 1: correct positions
    for (let i = 0; i < COLS; i++) {
      if (guessArr[i] === targetArr[i]) {
        result[i]    = "correct";
        used[i]      = true;
        guessArr[i]  = null;
      }
    }
    // Pass 2: present but wrong position
    for (let i = 0; i < COLS; i++) {
      if (result[i] === "correct") continue;
      for (let j = 0; j < COLS; j++) {
        if (!used[j] && guessArr[i] === targetArr[j]) {
          result[i] = "present";
          used[j]   = true;
          break;
        }
      }
    }
    return result;
  }

  // ── Animations ──
  function revealRow(rowIdx, result, guess) {
    board[rowIdx].forEach((tile, i) => {
      setTimeout(() => {
        // Remove data-letter so the pop/border styles don't fight the flip animation
        delete tile.dataset.letter;
        tile.classList.add("revealed", result[i]);
        updateKey(guess[i], result[i]);
      }, i * 100);
    });
  }

  function shakeRow(rowIdx) {
    board[rowIdx].forEach(tile => {
      tile.classList.remove("shake");
      void tile.offsetWidth;
      tile.classList.add("shake");
    });
  }

  function bounceRow(rowIdx) {
    board[rowIdx].forEach((tile, i) => {
      setTimeout(() => tile.classList.add("bounce"), i * 80);
    });
  }

  // ── Keyboard Colors ──
  const keyPriority = { correct: 3, present: 2, absent: 1 };

  function updateKey(letter, state) {
    const btn = document.querySelector(`[data-key="${letter}"]`);
    if (!btn) return;
    const current = btn.dataset.state;
    if (!current || keyPriority[state] > keyPriority[current]) {
      btn.className      = `key ${letter.length > 1 ? "wide " : ""}${state}`;
      btn.dataset.state  = state;
    }
  }

  // ── Toast ──
  function showToast(msg, duration = 1600) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), duration);
  }

  // ── End Screen ──
  function showEndScreen(won) {
    document.getElementById("end-title").textContent   = won ? "Brilliant!" : "Better luck next time";
    document.getElementById("end-word").textContent    = targetWord;
    document.getElementById("end-guesses").textContent = won
      ? `Solved in ${guesses.length} of ${ROWS} ${guesses.length === 1 ? "guess" : "guesses"}`
      : "The word was:";
    document.getElementById("end-message").textContent = won
      ? "You cracked today's Sixdle."
      : "Don't worry — new word, new chance.";
    document.getElementById("end-overlay").classList.add("show");
  }

  // ── Start ──
  newGame();
